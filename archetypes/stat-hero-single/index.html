<!DOCTYPE html>
<!-- archetype: stat-hero-single | target: 1080x1080 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #111;
    position: relative;
    font-family: sans-serif;
  }

  .decorative-zone {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .category {
    position: absolute;
    right: 28px;
    top: 45px;
    z-index: 5;
  }
  .category span {
    font-weight: 700;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
    transform: rotate(90deg);
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .context-label {
    position: absolute;
    left: 68px;
    top: 160px;
    font-weight: 500;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    z-index: 2;
  }

  .stat-number {
    position: absolute;
    left: 68px;
    top: 190px;
    font-weight: 900;
    font-size: 260px;
    line-height: 0.85;
    color: #ffffff;
    letter-spacing: -0.04em;
    z-index: 2;
  }

  .headline {
    position: absolute;
    left: 68px;
    top: 520px;
    width: 900px;
    font-weight: 900;
    font-size: 82px;
    line-height: 0.95;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    z-index: 2;
  }

  .body-copy {
    position: absolute;
    left: 68px;
    top: 740px;
    width: 750px;
    font-weight: 400;
    font-size: 24px;
    line-height: 1.45;
    color: rgba(255,255,255,0.45);
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="decorative-zone"></div>

  <!-- SLOT: category -->
  <div class="category">
    <span>PAYMENT PROCESSING</span>
  </div>

  <!-- SLOT: context-label -->
  <p class="context-label">APPROVAL RATE ACROSS ALL PSPs</p>

  <!-- SLOT: stat-number -->
  <div class="stat-number">94%</div>

  <!-- SLOT: headline -->
  <p class="headline">WHILE COMPETITORS LEAVE MONEY ON THE TABLE</p>

  <!-- SLOT: body-copy -->
  <p class="body-copy">Seven PSPs. Automatic retry logic. Every transaction gets its best shot at clearing. The difference between 87% and 94% is millions in recovered revenue.</p>
</body>
</html>
